<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Vishal Consulting</title>
<link rel="stylesheet" href="style.css">

<style>
.login-container{
max-width:400px;
margin:80px auto;
padding:30px;
background:#111827;
border:2px solid #22c55e;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(34,197,94,.25);
}

.login-container h1{
color:#22c55e;
margin-bottom:20px;
}

.login-container input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}

.login-btn{
width:100%;
padding:14px;
background:#22c55e;
color:#000;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#16a34a;
color:#fff;
}

.login-container p{
margin-top:15px;
color:#ccc;
}
</style>
</head>

<body>

<div class="login-container">
<h1>🔐 Login</h1>

<form onsubmit="login(event)">
<input type="email" placeholder="Enter Email" required>
<input type="password" placeholder="Enter Password" required>

<button type="submit" class="login-btn">Login</button>
</form>

<p>Welcome to Vishal Consulting</p>
</div>

<script>
function login(event){
event.preventDefault();
alert("Login Successful!");
window.location.href = "index.html";
}
</script>

</body>
</html>
